    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #1E90FF; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px;
        }
        .music-player {
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: #fff;
        }
        .music-title {
            font-size: 22px;
            margin: 10px 0 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-singer {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 20px;
        }
        /* 歌词容器样式优化 */
        .lyric-box {
            width: 100%;
            height: 180px;
            line-height: 36px;
            overflow: hidden;
            margin: 10px 0;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px 0;
        }
        .lyric-list {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: top 0.3s ease;
        }
        .lyric-item {
            font-size: 16px;
            color: #ccc;
            height: 36px;
            transition: all 0.2s ease;
        }
        .lyric-item.active {
            color: #25d366;
            font-size: 18px;
            font-weight: bold;
        }
        /* 双语歌词样式 */
        .lyric-item .dual {
            font-size: 12px;
            color: #999;
            display: block;
            line-height: 1.2;
            margin-top: -8px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            margin: 10px 0;
            cursor: pointer;
        }
        .progress {
            height: 100%;
            background: #25d366;
            border-radius: 3px;
            width: 0%;
        }
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #ccc;
            margin-top: -5px;
            margin-bottom: 20px;
        }
        .control-btns {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 10px 0;
        }
        .btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #25d366;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #12b24e;
            transform: scale(1.1);
        }
        .play-btn {
            width: 60px;
            height: 60px;
            font-size: 24px;
        }
        .volume {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .volume-bar {
            width: 150px;
            height: 6px;
            background: #444;
            border-radius: 3px;
            cursor: pointer;
        }
        .volume-progress {
            height: 100%;
            background: #25d366;
            border-radius: 3px;
            width: 80%;
        }
        /* 提示文本样式 */
        .tip-text {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
        }
    </style>
</head>

        // 渲染歌词（支持HTML解析）
        function renderLyrics(lyrics) {
            lyrics.forEach(item => {
                const li = document.createElement('div');
                li.className = 'lyric-item';
                li.innerHTML = item[1]; // 使用innerHTML支持HTML标签
                li.dataset.time = item[0];
                lyricList.appendChild(li);
            });
        }

        // 匹配并滚动歌词（优化边界处理）
        function updateLyric() {
            const currentTime = audio.currentTime;
            const allLyrics = document.querySelectorAll('.lyric-item');
            if (allLyrics.length === 0) return;

            let activeIndex = 0;
            // 找到当前歌词索引
            for (let i = 0; i < allLyrics.length; i++) {
                const lyricTime = Number(allLyrics[i].dataset.time);
                const nextLyricTime = i < allLyrics.length - 1 ? Number(allLyrics[i+1].dataset.time) : audio.duration;
                
                if (currentTime >= lyricTime && currentTime < nextLyricTime) {
                    activeIndex = i;
                    break;
                }
            }

            // 更新高亮状态
            allLyrics.forEach((item, index) => {
                if (index === activeIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            // 歌词滚动（优化边界，防止滚动过度）
            const lineHeight = 36;
            const boxHeight = lyricBox.clientHeight;
            const maxScroll = Math.max(0, (allLyrics.length * lineHeight) - boxHeight);
            const targetTop = Math.min(maxScroll, Math.max(0, activeIndex * lineHeight - boxHeight / 2 + 18));
            lyricList.style.top = `-${targetTop}px`;
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerText = '▶';
            } else {
                audio.play();
                playBtn.innerText = '❚❚';
            }
            isPlaying = !isPlaying;
        });

        // 上一曲/下一曲
        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + musicList.length) % musicList.length;
            initMusic(currentIndex);
            if (isPlaying) playMusic();
        });
        
        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % musicList.length;
            initMusic(currentIndex);
            if (isPlaying) playMusic();
        });
        
        function playMusic() {
            audio.play().catch(err => {
                alert('播放失败：' + err.message);
                playBtn.innerText = '▶';
                isPlaying = false;
            });
            playBtn.innerText = '❚❚';
            isPlaying = true;
        }

        // 更新进度条 + 同步歌词
        audio.ontimeupdate = () => {
            if (isNaN(audio.duration)) return;
            
            const currentTime = audio.currentTime;
            const duration = audio.duration;
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;
            currentTimeEl.innerText = formatTime(currentTime);
            
            updateLyric();
            
            // 自动切歌（添加容错）
            if (currentTime >= duration - 0.5 && duration > 0) {
                nextBtn.click();
            }
        };

        // 进度条跳转
        progressBar.addEventListener('click', (e) => {
            if (isNaN(audio.duration)) return;
            
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
            updateLyric();
        });

        // 音量调节
        volumeBar.addEventListener('click', (e) => {
            const width = volumeBar.clientWidth;
            const clickX = e.offsetX;
            const volumePercent = (clickX / width) * 100;
            volumeProgress.style.width = `${volumePercent}%`;
            audio.volume = volumePercent / 100;
        });

        // 时间格式化（容错处理）
        function formatTime(time) {
            if (isNaN(time) || time < 0) return '00:00';
            
            const minutes = Math.floor(time / 60).toString().padStart(2, '0');
            const seconds = Math.floor(time % 60).toString().padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        // 初始设置
        audio.volume = 0.8;
        // 页面加载完成后自动聚焦播放器
        window.addEventListener('load', () => {
            document.querySelector('.music-player').focus();
        });
    </script>
</body>
</html>
